<style>
  :root{
    --bg: #050914;
    --panel: rgba(12, 22, 48, .78);
    --panel2: rgba(10, 18, 41, .92);
    --line: rgba(120, 160, 255, .16);
    --line2: rgba(120, 160, 255, .22);

    --text: #eaf2ff;
    --muted: rgba(190, 210, 255, .72);

    --brand: #4f8cff;
    --brand2:#2dd4bf;

    --ok: #2dd4bf;
    --warn: #fbbf24;
    --bad: #fb7185;
    --info:#60a5fa;

    --shadow: 0 18px 60px rgba(0,0,0,.55);
    --shadow2: 0 8px 24px rgba(0,0,0,.35);
    --radius: 18px;
    --radius2: 14px;

    --btn: rgba(79, 140, 255, .12);
    --btnBorder: rgba(79, 140, 255, .25);

    --glass: blur(14px);
  }

  *{box-sizing:border-box}

  html,body{height:100%}
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial;
    background:
      radial-gradient(1200px 700px at 18% 10%, rgba(79,140,255,.22), transparent 60%),
      radial-gradient(900px 500px at 82% 0%, rgba(45,212,191,.14), transparent 55%),
      radial-gradient(1200px 800px at 60% 95%, rgba(99,102,241,.10), transparent 55%),
      linear-gradient(180deg, #040713, #050914 55%, #040713);
    overflow-x:hidden;
  }

  /* Scroll */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{
    background: rgba(120,160,255,.22);
    border-radius: 999px;
    border: 2px solid rgba(0,0,0,0);
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-track{background: rgba(255,255,255,.04)}

  .wrap{
    max-width: 1150px;
    margin: 40px auto;
    padding: 0 16px;
  }

  .card{
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 18px;
    margin-bottom: 14px;
    backdrop-filter: var(--glass);
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  h1{
    margin:0;
    font-size: 26px;
    letter-spacing:.2px;
  }

  .muted{
    color: var(--muted);
    font-size: 13px;
  }

  .status{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .ok{ color: var(--ok); }
  .warn{ color: var(--warn); }
  .err, .bad{ color: var(--bad); }
  .info{ color: var(--info); }

  .row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }

  input, select, button, textarea{
    color: var(--text);
    background: rgba(7, 14, 33, .72);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 11px 12px;
    outline:none;
    transition: .15s ease;
  }

  input::placeholder, textarea::placeholder{color: rgba(190,210,255,.45)}
  input:focus, textarea:focus, select:focus{
    border-color: rgba(79,140,255,.55);
    box-shadow: 0 0 0 4px rgba(79,140,255,.12);
  }

  button{
    cursor:pointer;
    background: linear-gradient(180deg, rgba(79,140,255,.18), rgba(79,140,255,.10));
    border: 1px solid var(--btnBorder);
    box-shadow: var(--shadow2);
    font-weight: 600;
    letter-spacing:.2px;
  }
  button:hover{
    transform: translateY(-1px);
    border-color: rgba(79,140,255,.55);
  }
  button:active{
    transform: translateY(0px);
    opacity:.95;
  }

  .btnGhost{
    background: rgba(255,255,255,.05);
    border-color: rgba(120,160,255,.18);
  }

  .btnDanger{
    background: linear-gradient(180deg, rgba(251,113,133,.18), rgba(251,113,133,.08));
    border-color: rgba(251,113,133,.28);
  }

  .btnOk{
    background: linear-gradient(180deg, rgba(45,212,191,.18), rgba(45,212,191,.08));
    border-color: rgba(45,212,191,.30);
  }

  .small{font-size: 12.5px; color: var(--muted)}
  .sep{height:1px;background:rgba(120,160,255,.14);margin:12px 0}

  /* ======= APP LAYOUT ======= */
  .grid{
    display:grid;
    grid-template-columns: 360px 1fr;
    gap: 14px;
  }

  .panel{
    background: linear-gradient(180deg, rgba(12, 22, 48, .65), rgba(10, 18, 41, .92));
    border: 1px solid rgba(120,160,255,.14);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    backdrop-filter: var(--glass);
    min-height: 560px;
  }

  .panelHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom: 10px;
  }

  .panelHeader .title{
    font-weight: 800;
    letter-spacing:.2px;
  }

  /* ======= LEADS ======= */
  #leads{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top: 10px;
    max-height: 470px;
    overflow:auto;
    padding-right:6px;
  }

  .lead{
    border: 1px solid rgba(120,160,255,.12);
    background: rgba(7, 14, 33, .58);
    border-radius: 16px;
    padding: 12px 12px;
    cursor:pointer;
    transition: .14s ease;
  }
  .lead:hover{
    border-color: rgba(79,140,255,.45);
    transform: translateY(-1px);
  }
  .lead.active{
    border-color: rgba(45,212,191,.55);
    box-shadow: 0 0 0 4px rgba(45,212,191,.10);
  }

  .titleRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .titleRow .title{
    font-weight: 800;
    font-size: 14px;
    letter-spacing:.2px;
  }

  .badge{
    font-size: 11px;
    font-weight: 800;
    letter-spacing:.35px;
    padding: 5px 9px;
    border-radius: 999px;
    border: 1px solid rgba(120,160,255,.18);
    background: rgba(255,255,255,.05);
    text-transform: uppercase;
  }
  .badge.ok{
    color: var(--ok);
    border-color: rgba(45,212,191,.35);
    background: rgba(45,212,191,.10);
  }
  .badge.warn{
    color: var(--warn);
    border-color: rgba(251,191,36,.35);
    background: rgba(251,191,36,.10);
  }
  .badge.bad{
    color: var(--bad);
    border-color: rgba(251,113,133,.35);
    background: rgba(251,113,133,.10);
  }
  .badge.info{
    color: var(--info);
    border-color: rgba(96,165,250,.35);
    background: rgba(96,165,250,.10);
  }

  /* ======= CHAT ======= */
  .chatHeader{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom: 10px;
  }

  #leadTitle{
    font-size: 16px;
    font-weight: 900;
    letter-spacing:.2px;
  }

  #leadMeta{
    margin-top: 4px;
    color: rgba(190,210,255,.62);
    font-size: 12px;
  }

  #chat{
    background: rgba(7, 14, 33, .45);
    border: 1px solid rgba(120,160,255,.12);
    border-radius: 18px;
    padding: 12px;
    height: 380px;
    overflow:auto;
  }

  .msg{
    margin: 8px 0;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(120,160,255,.10);
    background: rgba(255,255,255,.04);
    max-width: 92%;
    box-shadow: 0 10px 20px rgba(0,0,0,.20);
  }

  .msg .meta{
    font-size: 11px;
    color: rgba(190,210,255,.58);
    margin-bottom: 6px;
  }

  .msg.inbound{
    margin-right:auto;
    border-color: rgba(79,140,255,.18);
    background: linear-gradient(180deg, rgba(79,140,255,.10), rgba(255,255,255,.02));
  }

  .msg.outbound{
    margin-left:auto;
    border-color: rgba(45,212,191,.22);
    background: linear-gradient(180deg, rgba(45,212,191,.10), rgba(255,255,255,.02));
  }

  .msg.system{
    margin-left:auto;
    margin-right:auto;
    max-width: 100%;
    text-align:center;
    border-style:dashed;
    border-color: rgba(120,160,255,.18);
    background: rgba(255,255,255,.03);
  }

  .composer{
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:flex-end;
  }

  textarea{
    width:100%;
    min-height: 90px;
    resize: vertical;
    border-radius: 18px;
    padding: 12px 12px;
  }

  .rightBtns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  /* Login */
  #loginCard input{
    min-width: 220px;
  }
  #loginCard button{
    min-width: 140px;
  }

  /* Mobile */
  @media (max-width: 980px){
    .grid{grid-template-columns: 1fr}
    .panel{min-height:auto}
    #leads{max-height: 260px}
    #chat{height: 340px}
    .topbar{flex-direction:column;align-items:flex-start}
  }
</style>
